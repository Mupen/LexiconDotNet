services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5217:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
    secrets:
      - NewsApi__ApiKey

  frontend:
    build:
      context: ./Frontend/Public
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5217
    ports:
      - "5173:80"
    depends_on:
      - api

secrets:
  NewsApi__ApiKey:
    environment: NEWSAPI_KEY
