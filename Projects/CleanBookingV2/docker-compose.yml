services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5217:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__CleanBookingV2: Data Source=/app/Data/cleanbookingv2.db
    volumes:
      - cleanbooking_data:/app/Data

  frontend:
    build:
      context: ./Frontend/Public
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5217
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  cleanbooking_data:
